# Tmux settings

set -g default-shell $SHELL

# remap prefix from 'C-b' to 'C-a'
unbind C-b
set-option -g prefix C-a
bind-key C-a send-prefix

# split panes using | and -
bind \ split-window -h -c '#{pane_current_path}'
bind - split-window -v -c '#{pane_current_path}'
unbind '"'
unbind %

# Set reload key to r
bind r source-file ~/.tmux.conf

# Smart pane switching with awareness of Vim splits.
# # See: https://github.com/christoomey/vim-tmux-navigator
is_vim="ps -o state= -o comm= -t '#{pane_tty}' \
    | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?(view|n?vim?x?)(diff)?$'"
bind-key -n C-h if-shell "$is_vim" "send-keys C-h"  "select-pane -L"
bind-key -n C-j if-shell "$is_vim" "send-keys C-j"  "select-pane -D"
bind-key -n C-k if-shell "$is_vim" "send-keys C-k"  "select-pane -U"
bind-key -n C-l if-shell "$is_vim" "send-keys C-l"  "select-pane -R"
bind-key -n C-\ if-shell "$is_vim" "send-keys C-\\" "select-pane -l"
bind-key -T copy-mode-vi C-h select-pane -L
bind-key -T copy-mode-vi C-j select-pane -D
bind-key -T copy-mode-vi C-k select-pane -U
bind-key -T copy-mode-vi C-l select-pane -R
bind-key -T copy-mode-vi C-\ select-pane -l

# vim-tmux-clipboard plugin needs this
set -g focus-events on

# Set XTerm key bindings
setw -g xterm-keys on

# Set colors
# set-option -g default-terminal "xterm-256color"

# Count sessions start at 1
set -g base-index 1

# set scrollback limit a bit higher than the default
set-option -g history-limit 30000

# dont wait for escape characters
set -s escape-time 0

# set mouse
set -g mouse on

# dont allow rename of the windows
set-option -g allow-rename off

# # Use vim keybindings in copy mode
setw -g mode-keys vi

unbind [
bind Escape copy-mode

bind-key -T copy-mode-vi 'v' send -X begin-selection
if-shell -b 'test $(uname) = "Linux"' 'bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "xclip -in -selection clipboard"'
if-shell -b 'test $(uname) = "Darwin"' 'bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "pbcopy"'

# Bind ']' to use pbpaste
if-shell -b 'test $(uname) = "Linux"' 'bind p run "xclip -o | tmux load-buffer - && tmux paste-buffer"'
if-shell -b 'test $(uname) = "Darwin"' 'bind p run "pbpaste | tmux load-buffer - && tmux paste-buffer"'
